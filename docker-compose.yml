services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ams-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8501}:8501"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - STREAMLIT_BASE_URL_PATH=${STREAMLIT_BASE_URL_PATH:-/ams}
    networks:
      - postgres-network
      - caddy_net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS \"http://localhost:8501$${STREAMLIT_BASE_URL_PATH:-/ams}/_stcore/health\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ams-api
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - postgres-network
      - caddy_net
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  postgres-network:
    external: true
  
  caddy_net:
    external: true
